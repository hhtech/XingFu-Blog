<header class="sora-header">
    <nav class="sora-nav">
        <a class="sora-brand" href="{{ .Site.Home.RelPermalink }}">{{ .Site.Title }}</a>

        <div class="sora-nav-links">
            {{ range .Site.Menus.main.ByWeight }}
                {{ $isHome := eq .URL $.Site.Home.RelPermalink }}
                {{ $isActive := cond $isHome (eq $.RelPermalink .URL) (hasPrefix $.RelPermalink .URL) }}
                <a href="{{ .URL }}"{{ if $isActive }} class="is-active"{{ end }}>{{ .Name }}</a>
            {{ end }}

            {{ range .Site.Menus.social }}
                <a href="{{ .URL }}" target="_blank" rel="noopener">{{ .Name }}</a>
            {{ end }}
        </div>
    </nav>
    <div class="sora-divider"></div>
</header>

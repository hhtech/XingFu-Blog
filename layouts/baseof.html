<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default `zh-cn` }}" dir="{{ default `ltr` .Language.LanguageDirection }}">
    <head>
        {{- partial "head/head.html" . -}}
        {{- block "head" . -}}{{ end }}
    </head>
    <body class="sora-body {{ block `body-class` . }}{{ end }}">
        <div class="sora-page">
            {{- block "page-header" . -}}
                {{- partial "sora/header.html" . -}}
            {{- end -}}

            <main class="sora-main {{ block `main-class` . }}{{ end }}">
                {{- block "main" . }}{{ end -}}
            </main>

            {{- block "after-main" . -}}{{ end }}

            {{- partial "footer/footer.html" . -}}
        </div>

        {{- partial "footer/include.html" . -}}
    </body>
</html>

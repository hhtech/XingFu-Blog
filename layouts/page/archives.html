{{ define "main" }}
    <section class="sora-archives">
        {{ range (where .Site.RegularPages "Section" "post").GroupByDate "2006" }}
            <div class="sora-archive-year">
                <h2>{{ .Key }}</h2>

                {{ range .Pages }}
                    <div class="sora-archive-item">
                        <time class="sora-archive-date" datetime="{{ .Date.Format `2006-01-02T15:04:05Z07:00` }}">
                            {{ .Date | time.Format `2006-01-02` }}
                        </time>
                        <span>
                            <a class="sora-archive-link" href="{{ .RelPermalink }}">{{ .Title }}</a>
                        </span>
                    </div>
                {{ end }}
            </div>
        {{ end }}
    </section>
{{ end }}

{{ define "main" }}
    <section class="sora-page-header">
        <span class="sora-page-kicker">内容归档</span>
        <h1>{{ .Title }}</h1>
        <p>按年份浏览已经迁移过来的文章。</p>
    </section>

    {{ $pages := partial "helper/pages.html" .Site.Home }}
    <section class="sora-archives">
        {{ range $pages.GroupByDate "2006" }}
            <div class="sora-archives-group">
                <h2>{{ .Key }}</h2>
                <div class="sora-archives-list">
                    {{ range .Pages }}
                        <article class="sora-archive-entry">
                            <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "2006-01-02" }}</time>
                            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                        </article>
                    {{ end }}
                </div>
            </div>
        {{ end }}
    </section>
{{ end }}
